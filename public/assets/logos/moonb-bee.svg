  <ellipse cx="23" cy="9" rx="5" ry="3.5" fill="#FFE082" opacity="0.7" transform="rotate(15 23 9)"/>

  <!-- Body — chunky yellow oval -->
  <ellipse cx="20" cy="20" rx="8" ry="6.5" fill="#FFD54F"/>
  <ellipse cx="20" cy="20" rx="8" ry="6.5" fill="none" stroke="#343433" stroke-width="0.8"/>

  <!-- Stripes -->
  <rect x="15.5" y="14.5" width="2" height="11" rx="1" fill="#343433"/>
  <rect x="19" y="13.8" width="2" height="12.4" rx="1" fill="#343433"/>
  <rect x="22.5" y="14.5" width="2" height="11" rx="1" fill="#343433"/>

  <!-- Head -->
  <circle cx="28" cy="19" r="3.8" fill="#343433"/>

  <!-- Eyes — big cute -->
  <circle cx="26.8" cy="18" r="1.5" fill="white"/>
  <circle cx="29.5" cy="18" r="1.5" fill="white"/>
  <circle cx="27.1" cy="18.2" r="0.7" fill="#343433"/>
  <circle cx="29.8" cy="18.2" r="0.7" fill="#343433"/>

