  <path d="M29 15.2C29.5 13.5 31 12.5 32 12" stroke="#343433" stroke-width="0.9" stroke-linecap="round" fill="none"/>
  <circle cx="23.2" cy="11.8" r="1.1" fill="#FFD54F"/>
  <circle cx="32.3" cy="11.8" r="1.1" fill="#FFD54F"/>

  <!-- Stinger -->
  <path d="M12 20.5L10 21V20L12 20.5z" fill="#343433"/>
