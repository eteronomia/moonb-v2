<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40">
  <!-- Bee icon -->
  <g transform="translate(0, 8)">
    <!-- Body -->
    <circle cx="10" cy="12" r="5.5" fill="#1A1A1A"/>
    <circle cx="15" cy="12" r="5.5" fill="#1A1A1A"/>
    <!-- Head -->
    <circle cx="19" cy="7" r="3.5" fill="#1A1A1A"/>
    <!-- Wings -->
    <line x1="8" y1="7" x2="4" y2="2" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="7" x2="9" y2="2" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Antennae -->
    <line x1="21" y1="4.5" x2="23.5" y2="1" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="18.5" y1="4" x2="17.5" y2="1" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="23.5" cy="1" r="0.8" fill="#1A1A1A"/>
    <circle cx="17.5" cy="1" r="0.8" fill="#1A1A1A"/>
    <!-- Body stripe -->
    <line x1="12.5" y1="8" x2="12.5" y2="16" stroke="#FFFFFF" stroke-width="0.9" opacity="0.4"/>
  </g>
  <!-- Wordmark: "moonb" -->
  <text x="34" y="28" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="-0.04em" fill="#1A1A1A">moonb</text>
</svg>
