<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Body: two overlapping circles forming figure-8 -->
  <circle cx="13" cy="16" r="7" fill="#1A1A1A"/>
  <circle cx="19" cy="16" r="7" fill="#1A1A1A"/>
  <!-- Head -->
  <circle cx="24" cy="10" r="4.5" fill="#1A1A1A"/>
  <!-- Wings: two angled lines -->
  <line x1="11" y1="9" x2="6" y2="3" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="9" x2="12" y2="3" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Antennae -->
  <line x1="26" y1="7" x2="29" y2="3" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="6" x2="22" y2="2" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Antenna tips -->
  <circle cx="29" cy="3" r="1" fill="#1A1A1A"/>
  <circle cx="22" cy="2" r="1" fill="#1A1A1A"/>
  <!-- Stripe detail on body -->
  <line x1="16" y1="11" x2="16" y2="21" stroke="#FFFFFF" stroke-width="1.2" opacity="0.4"/>
</svg>
